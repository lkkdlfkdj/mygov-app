name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Buildozer (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-sdk-1

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-setuptools python3-dev \
            git zip unzip build-essential ccache autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev libltdl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv

      - name: Show versions
        run: |
          java -version 2>&1
          python --version
          buildozer --version 2>&1 || true

      - name: Diagnose buildozer
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== buildozer.spec exists ==="
          test -f buildozer.spec && echo "YES" || echo "NO"
          echo "=== python ==="
          which python && python --version
          echo "=== buildozer ==="
          which buildozer 2>/dev/null || echo "no buildozer"
          echo "=== contents ==="
          ls -la

      - name: Build APK
        run: |
          python -m buildozer android debug 2>&1 | tee build_log.txt
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Print build log tail
        if: success() || failure()
        run: |
          echo "=== build_log.txt ==="
          cat build_log.txt 2>/dev/null || echo "no log"
          echo "=== bin/ ==="
          ls -la bin/ 2>/dev/null || echo "no bin/"
          echo "=== .buildozer/ ==="
          ls -la .buildozer/ 2>/dev/null || echo "no .buildozer/"
          echo "=== find apks ==="
          find . -name "*.apk" 2>/dev/null || echo "no apk files"
          echo "=== build.log ==="
          find .buildozer -name "build.log" 2>/dev/null -exec head -100 {} \;

      - name: Upload build log
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
