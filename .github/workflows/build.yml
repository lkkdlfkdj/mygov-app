name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-setuptools python3-dev \
            git zip unzip openjdk-17-jdk build-essential ccache \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-distutils

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Debug - list files and check spec
        run: |
          pwd
          ls -la
          echo "--- buildozer.spec ---"
          cat buildozer.spec | head -20
          echo "--- check python ---"
          python3 -c "import buildozer; print('buildozer OK')" 2>&1 || echo "buildozer import failed"
          which buildozer 2>&1 || echo "no buildozer binary"

      - name: Build APK
        run: |
          python3 -m buildozer android debug --verbose 2>&1
