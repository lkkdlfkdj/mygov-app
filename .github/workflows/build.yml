name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Buildozer (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-sdk-1

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-setuptools python3-dev \
            git zip unzip build-essential ccache autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev libltdl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv

      - name: Show versions
        run: |
          java -version 2>&1
          python --version
          buildozer --version 2>&1 || true

      - name: Build APK
        run: |
          python -m buildozer android debug 2>&1 | tee build_log.txt

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Upload APK on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mygovapp-apk
          path: bin/*.apk
