name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-setuptools python3-dev \
            git zip unzip openjdk-17-jdk build-essential ccache \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip3 install --upgrade buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Show versions
        run: |
          python3 --version
          pip3 --version
          which buildozer || echo "buildozer not in PATH"

      - name: Build APK with Buildozer
        run: |
          python3 -m buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mygovapp-debug-apk
          path: bin/*.apk
