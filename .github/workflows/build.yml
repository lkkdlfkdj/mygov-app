name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-setuptools python3-dev \
            git zip unzip build-essential ccache autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev libltdl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv

      - name: Build APK
        run: |
          python -m buildozer android debug 2>&1 | tee build_log.txt
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload build output
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build_log.txt
            .buildozer/android/platform/build-*/build.log
          if-no-files-found: warn

      - name: List APK
        if: success()
        run: |
          ls -la bin/ 2>/dev/null || echo "bin/ not found"
          find . -name "*.apk" 2>/dev/null || echo "no apk found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mygovapp-apk
          path: bin/*.apk
          if-no-files-found: error
